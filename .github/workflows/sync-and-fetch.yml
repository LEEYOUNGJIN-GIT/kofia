name: Sync fund list and fetch

on:
  workflow_dispatch:
    inputs:
      sync_only:
        description: "Only sync holdings.md → fund_list.yaml (skip fetch)"
        type: boolean
        default: false
      alias:
        description: "Single fund alias (empty = all enabled in fund_list.yaml)"
        required: false
        default: ""
      quarter:
        description: "Quarter e.g. 2025Q3 (optional)"
        required: false
        default: ""
      commit_config:
        description: "Commit updated fund_list.yaml when sync changes it"
        type: boolean
        default: true
      commit_data:
        description: "Commit timeseries CSV after fetch"
        type: boolean
        default: false
      use_gemini:
        description: "Optional Gemini pass on fetch"
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - "docs/holdings_fund_list.md"

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync holdings → fund_list.yaml
        run: python src/fund_list_sync.py

      - name: Commit fund_list.yaml (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/fund_list.yaml
          if git diff --staged --quiet; then
            echo "fund_list.yaml unchanged"
          else
            git commit -m "chore(config): sync fund list from holdings"
            git push
          fi

      - name: Fetch dis data (enabled funds)
        if: github.event_name == 'push' || github.event.inputs.sync_only != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="src/dis_parser.py --fetch"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.alias }}" ]; then
            ARGS="$ARGS --alias ${{ github.event.inputs.alias }}"
          fi
          if [ -n "${{ github.event.inputs.quarter }}" ]; then
            ARGS="$ARGS --quarter ${{ github.event.inputs.quarter }}"
          fi
          if [ "${{ github.event.inputs.use_gemini }}" = "true" ]; then
            ARGS="$ARGS --gemini"
          fi
          python $ARGS

      - name: Commit timeseries (if enabled)
        if: |
          (github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.commit_data == 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/timeseries data/logs
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): dis fetch $(date -u +%Y%m%d)"
            git push
          fi

      - name: Upload artifacts
        if: always() && (github.event_name == 'push' || github.event.inputs.sync_only != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: kofia-pipeline-${{ github.run_id }}
          path: |
            config/fund_list.yaml
            data/timeseries/*.csv
            data/logs/run_*_fetch.json
