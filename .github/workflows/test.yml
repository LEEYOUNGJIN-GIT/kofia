name: Test parsers (fixtures)

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q
