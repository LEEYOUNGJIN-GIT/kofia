name: Verify dis.kofia (M0.5)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "config/**"
      - ".github/workflows/verify-dis.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: M0.5 dry-run (G1)
        run: python src/dis_parser.py --dry-run --alias TDF2050_Ce

      - name: Upload run manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-dis-manifest
          path: data/logs/run_*_dryrun.json
