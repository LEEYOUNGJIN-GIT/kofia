name: Verify dis.kofia (G1)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "config/**"
      - "docs/holdings_fund_list.md"
      - ".github/workflows/verify-dis.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync fund list
        run: python src/fund_list_sync.py

      - name: Unit tests
        run: python -m pytest tests/ -q

      - name: G1 dry-run (first enabled fund)
        run: python src/dis_parser.py --dry-run

      - name: Upload run manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-dis-manifest
          path: data/logs/run_*_dryrun.json
